name: TrelloClone
options:
  bundleIdPrefix: com.trelloclone
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.38.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: false
targets:
  TrelloClone:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: TrelloClone
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: TrelloClone/Info.plist
        CODE_SIGN_ENTITLEMENTS: TrelloClone/TrelloClone.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.trelloclone.app
        DEVELOPMENT_TEAM: 95MF6RX2GK
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        SWIFT_EMIT_LOC_STRINGS: true
